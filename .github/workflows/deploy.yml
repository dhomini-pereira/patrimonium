name: Mobile Build & OTA Update

on:
  push:
    branches:
      - master
      - main
    paths:
      - "./**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  ota-update:
    name: Publish OTA Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_ACCESS_TOKEN }}

      - name: Publish OTA update
        run: eas update --branch production --message "OTA update from commit ${{ github.sha }}" --non-interactive

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: ota-update

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_ACCESS_TOKEN }}

      - name: Build APK with EAS
        run: eas build --platform android --profile apk --non-interactive --wait

      - name: Download APK artifact
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')

          if [ -z "$BUILD_URL" ] || [ "$BUILD_URL" = "null" ]; then
            echo "Could not extract APK URL from EAS. Check the EAS dashboard."
            exit 0
          fi

          echo "Downloading APK from: $BUILD_URL"
          curl -L -o nexo.apk "$BUILD_URL"
          ls -lh nexo.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexo-android-apk
          path: nexo.apk
          if-no-files-found: warn
          retention-days: 90
